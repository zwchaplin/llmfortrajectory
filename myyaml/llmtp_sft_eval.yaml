### model
model_name_or_path: /root/yijia-tmp/LlamaFactory/models/qwen3-4b-instruct
# adapter_name_or_path: /root/yijia-tmp/LlamaFactory/saves/llmtp/lora/sft
template: default

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
